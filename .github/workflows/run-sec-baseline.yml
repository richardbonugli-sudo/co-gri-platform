name: Run SEC Runtime Baseline

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Baseline phase (1=CatA pilot, 2=CatA+B, 3=full)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - full
      ticker:
        description: 'Single ticker e.g. AAPL (overrides phase if set)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run - list tickers only, no API calls (no Supabase secrets needed)'
        required: false
        default: false
        type: boolean
      concurrency:
        description: 'Concurrent workers 1-10, default 3'
        required: false
        default: '3'
        type: string
      resume:
        description: 'Resume from checkpoint'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

jobs:
  run-baseline:
    name: SEC Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (including devDependencies)
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Validate baseline script exists
        run: test -f src/scripts/runSECBaseline.ts && echo "✅ Script found" || (echo "❌ Script not found at src/scripts/runSECBaseline.ts" && exit 1)

      - name: Verify tsx is available
        run: ./node_modules/.bin/tsx --version && echo "✅ tsx is available"

      - name: Validate Supabase secrets (live run only)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo ""
            echo "❌ MISSING REQUIRED SECRETS"
            echo "══════════════════════════════════════════════════════════════"
            echo "  VITE_SUPABASE_URL      = ${VITE_SUPABASE_URL:-(not set)}"
            echo "  VITE_SUPABASE_ANON_KEY = ${VITE_SUPABASE_ANON_KEY:-(not set)}"
            echo ""
            echo "  To fix: Go to your GitHub repo ->"
            echo "    Settings -> Secrets and variables -> Actions -> New repository secret"
            echo ""
            echo "  Add these two secrets:"
            echo "    VITE_SUPABASE_URL      -> your Supabase project URL"
            echo "                             (e.g. https://xxxx.supabase.co)"
            echo "    VITE_SUPABASE_ANON_KEY -> your Supabase anon/public key"
            echo ""
            echo "  Both values are in: Supabase Dashboard -> Project Settings -> API"
            echo ""
            echo "  Alternatively, enable 'Dry run' to test without Supabase credentials."
            echo "══════════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✅ Supabase secrets are set: ${VITE_SUPABASE_URL:0:30}..."
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Supabase CLI (live run only)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.200.3/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version
          echo "✅ Supabase CLI installed"

      - name: Deploy Edge Functions (live run only)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "Deploying edge functions to Supabase..."

          # Extract project ref from URL (https://PROJECTREF.supabase.co)
          PROJECT_REF=$(echo "$VITE_SUPABASE_URL" | sed 's|https://||' | sed 's|\.supabase\.co.*||')
          echo "Project ref: $PROJECT_REF"

          if [ -z "$PROJECT_REF" ] || [ "$PROJECT_REF" = "$VITE_SUPABASE_URL" ]; then
            echo "❌ Could not extract project ref from VITE_SUPABASE_URL: $VITE_SUPABASE_URL"
            echo "   Expected format: https://PROJECTREF.supabase.co"
            exit 1
          fi

          # Deploy each required edge function
          for fn in fetch_sec_cik fetch_sec_filing extract_geographic_narrative; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "Deploying $fn..."
              supabase functions deploy $fn \
                --project-ref "$PROJECT_REF" \
                --no-verify-jwt 2>&1
              echo "✅ $fn deployed"
            else
              echo "⚠️  Function directory supabase/functions/$fn not found, skipping"
            fi
          done
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build CLI flags
        id: flags
        run: |
          FLAGS="--phase=${{ github.event.inputs.phase }}"

          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            FLAGS="$FLAGS --ticker=${{ github.event.inputs.ticker }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          if [ -n "${{ github.event.inputs.concurrency }}" ] && [ "${{ github.event.inputs.concurrency }}" != "3" ]; then
            FLAGS="$FLAGS --concurrency=${{ github.event.inputs.concurrency }}"
          fi

          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            FLAGS="$FLAGS --resume"
          fi

          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            FLAGS="$FLAGS --verbose"
          fi

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Resolved flags: $FLAGS"

      - name: Run SEC baseline
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          NODE_ENV: development
        run: ./node_modules/.bin/tsx src/scripts/runSECBaseline.ts ${{ steps.flags.outputs.flags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sec-baseline-${{ github.run_id }}
          path: |
            docs/sec_baseline_results.json
            docs/sec_baseline_summary.md
            docs/sec_baseline_checkpoint.jsonl
          retention-days: 90
          if-no-files-found: warn

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sec_baseline_results.json docs/sec_baseline_summary.md docs/sec_baseline_checkpoint.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "chore: SEC baseline run [skip ci]" && git push)

name: Run SEC Runtime Baseline

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Baseline phase (1=CatA pilot, 2=CatA+B, 3=full)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - full
      ticker:
        description: 'Single ticker e.g. AAPL (overrides phase if set)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run - list tickers only, no API calls'
        required: false
        default: false
        type: boolean
      concurrency:
        description: 'Concurrent workers 1-10, default 3'
        required: false
        default: '3'
        type: string
      resume:
        description: 'Resume from checkpoint'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

jobs:
  run-baseline:
    name: SEC Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (including devDependencies)
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Validate baseline script
        run: test -f src/scripts/runSECBaseline.ts && echo "OK" || exit 1

      - name: Verify tsx is available
        run: ./node_modules/.bin/tsx --version

      - name: TypeScript check
        continue-on-error: true
        run: ./node_modules/.bin/tsc --noEmit --skipLibCheck src/scripts/runSECBaseline.ts 2>&1 || true

      - name: Build CLI flags
        id: flags
        run: |
          FLAGS="--phase=${{ github.event.inputs.phase }}"

          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            FLAGS="$FLAGS --ticker=${{ github.event.inputs.ticker }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          if [ -n "${{ github.event.inputs.concurrency }}" ] && [ "${{ github.event.inputs.concurrency }}" != "3" ]; then
            FLAGS="$FLAGS --concurrency=${{ github.event.inputs.concurrency }}"
          fi

          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            FLAGS="$FLAGS --resume"
          fi

          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            FLAGS="$FLAGS --verbose"
          fi

          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"
          echo "Resolved flags: $FLAGS"

      - name: Run SEC baseline
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          NODE_ENV: development
        run: ./node_modules/.bin/tsx src/scripts/runSECBaseline.ts ${{ steps.flags.outputs.flags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sec-baseline-${{ github.run_id }}
          path: |
            docs/sec_baseline_results.json
            docs/sec_baseline_summary.md
            docs/sec_baseline_checkpoint.jsonl
          retention-days: 90
          if-no-files-found: warn

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sec_baseline_results.json docs/sec_baseline_summary.md docs/sec_baseline_checkpoint.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: SEC baseline run [skip ci]" && git push

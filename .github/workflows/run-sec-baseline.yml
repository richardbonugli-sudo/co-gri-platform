# -----------------------------------------------------------------------------
# CO-GRI Platform - SEC Runtime Baseline
# -----------------------------------------------------------------------------
#
# Runs the SEC baseline script against live EDGAR filings and commits the
# results back to docs/baseline-results/ in the repository.
#
# What it does:
#   1. Resolves CIK numbers for each SEC-eligible company
#   2. Fetches the latest 10-K or 20-F filing from EDGAR
#   3. Parses structured data (revenue/PP&E/debt tables via cheerio DOM)
#   4. Extracts geographic narrative segments via OpenAI
#   5. Assigns evidence tiers and composite confidence scores
#   6. Writes results to docs/baseline-results/ and commits them
#
# Required GitHub Secrets:
#   SUPABASE_URL      - Supabase project URL
#   SUPABASE_ANON_KEY - Supabase anon key
#   OPENAI_API_KEY    - Required for narrative parsing (extract_geographic_narrative
#                       edge function calls the OpenAI Chat Completions API to
#                       identify geographic revenue segments in 10-K/20-F prose).
#                       Without this key the narrative parsing step is skipped and
#                       narrativeParsingSucceeded will be false for all companies.
#
# Manual trigger only (no schedule - runs can take 15-60 min depending on category):
#   GitHub UI - Actions - "SEC Runtime Baseline" - Run workflow
#
# Timeout / graceful shutdown:
#   Hard limit is 150 min (2.5 hours). The script is wrapped with a time-budget
#   watchdog that sends SIGTERM 8 minutes before the hard limit, giving the
#   script time to flush checkpoint.json and partial results. The post-processing
#   steps all run with `if: always()` so partial results are always committed
#   and uploaded as artifacts even if the run was cut short.
# -----------------------------------------------------------------------------

name: SEC Runtime Baseline

on:
  # Manual trigger only - this job can be long-running and expensive
  workflow_dispatch:
    inputs:
      category:
        description: 'Company category to process'
        required: true
        default: 'A'
        type: choice
        options:
          - 'A'        # Cat A only - 41 hardcoded pilot companies
          - 'A+B'      # Cat A + B - ~55 companies (adds EDGAR-searched)
          - 'A+B+C'    # All SEC-eligible companies
          - 'full'     # Alias for A+B+C
      ticker:
        description: 'Single ticker override (e.g. AAPL) - leave blank for full category run'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (list tickers only, no API calls, no file writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-sec-baseline:
    name: Run SEC Baseline
    runs-on: ubuntu-latest
    # 150 minutes = 2.5 hours hard limit
    # The script watchdog sends SIGTERM 8 min before this limit so partial
    # results are flushed and committed before GitHub kills the runner.
    timeout-minutes: 150

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Budget = hard limit minus 8-minute graceful-shutdown buffer (in seconds)
      # 150 min - 8 min = 142 min = 8520 seconds
      SCRIPT_BUDGET_SECONDS: 8520

    permissions:
      contents: write  # Required to commit and push docs/baseline-results/

    steps:
      # -- Step 1: Checkout repository ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # -- Step 2: Setup Node.js -----------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # -- Step 3: Install dependencies ---------------------------------------
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
        env:
          NODE_ENV: development

      # -- Step 4: Validate required secrets ---------------------------------
      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "$SUPABASE_URL" ]; then
            echo "WARNING: SUPABASE_URL secret is not set - Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_URL"
          else
            echo "OK: SUPABASE_URL is available"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "WARNING: SUPABASE_ANON_KEY secret is not set - Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_ANON_KEY"
          else
            echo "OK: SUPABASE_ANON_KEY is available"
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "WARNING: OPENAI_API_KEY secret is not set."
            echo "Narrative parsing will be skipped. narrativeParsingSucceeded will be false for all companies."
            MISSING="$MISSING OPENAI_API_KEY"
          else
            echo "OK: OPENAI_API_KEY is available"
          fi
          if [ -n "$MISSING" ]; then
            echo "Missing secrets:$MISSING"
            echo "The run will continue in degraded mode (no Supabase writes / no narrative parsing)."
          fi
          DRY_RUN_INPUT="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN_INPUT" != "true" ] && [ -z "$SUPABASE_URL" ] && [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "WARNING: Both SUPABASE_URL and SUPABASE_ANON_KEY are missing."
            echo "The script will run in degraded mode."
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # -- Step 5: Ensure output directories exist ----------------------------
      - name: Ensure output directories exist
        run: |
          mkdir -p docs/baseline-results
          mkdir -p public/docs/baseline-results
          if [ ! -f docs/baseline-results/.gitkeep ]; then
            touch docs/baseline-results/.gitkeep
          fi
          echo "Output directories ready"
          ls -la docs/baseline-results/

      # -- Step 6: Run the SEC baseline script with reliable timeout enforcement
      #
      # WHY setsid + timeout instead of a bash watchdog:
      #   - "npx tsx" is a wrapper process. Sending SIGTERM to the npx PID does
      #     NOT reliably propagate to the real Node.js worker child process.
      #   - setsid puts the entire process tree (npx + tsx + node) into its
      #     own process group. "timeout --kill-after" then sends SIGTERM to the
      #     whole group, and SIGKILL 2 min later if anything is still alive.
      #   - The Node.js script has a SIGTERM handler that flushes partial results
      #     before exiting, so the 2-min SIGKILL window is just a safety net.
      #
      # Time budget breakdown (total hard limit = 150 min):
      #   8520s (142 min) = script wall-clock budget  -> SIGTERM sent to process group
      #   +120s (  2 min) = SIGKILL grace window       -> force-kill if still alive
      #   +  8 min        = commit + upload artifacts  -> remaining runner time
      - name: Run SEC baseline
        id: baseline
        # continue-on-error so post-processing steps always run even on timeout
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SCRIPT_BUDGET_MS: "8520000"
        run: |
          # -- Build CLI flags ----------------------------------------------
          FLAGS=""

          CATEGORY="${{ github.event.inputs.category }}"
          case "$CATEGORY" in
            "A")
              FLAGS="$FLAGS --phase=1"
              echo "Category A - 41 pilot companies (phase=1)"
              ;;
            "A+B")
              FLAGS="$FLAGS --phase=2"
              echo "Category A+B - ~55 companies (phase=2)"
              ;;
            "A+B+C"|"full")
              FLAGS="$FLAGS --phase=3"
              echo "Category A+B+C / full - all SEC-eligible companies (phase=3)"
              ;;
            *)
              FLAGS="$FLAGS --phase=1"
              echo "Unknown category '$CATEGORY', defaulting to phase=1 (Cat A)"
              ;;
          esac

          TICKER="${{ github.event.inputs.ticker }}"
          if [ -n "$TICKER" ]; then
            FLAGS="$FLAGS --ticker=$TICKER"
            echo "Single ticker mode: $TICKER"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "Running in DRY RUN mode - no API calls, no file writes"
          fi

          echo "Running: npx tsx src/scripts/runSECBaseline.ts $FLAGS"
          echo "Wall-clock budget: ${SCRIPT_BUDGET_SECONDS}s (external watchdog)"
          echo "Internal Node.js budget: ${SCRIPT_BUDGET_MS}ms"
          echo ""

          # ── Reliable timeout using a bash background watchdog ──────────────
          # WHY: setsid+timeout is unreliable on GitHub Actions because npx
          # spawns child processes and SIGTERM may not propagate through the
          # full npx→tsx→node chain. The Node.js script now has its own
          # internal budget watchdog (SCRIPT_BUDGET_MS), so the external
          # watchdog here is just a safety net for catastrophic hangs.
          #
          # Strategy:
          #   1. Start the Node.js script in the background, capture its PID
          #   2. Start a bash watchdog that sends SIGTERM to the Node PID after
          #      SCRIPT_BUDGET_SECONDS, then SIGKILL after 60s more
          #   3. Wait for the Node process to exit
          #   4. Kill the watchdog (it's no longer needed)

          set +e

          # Start the script in the background
          npx tsx src/scripts/runSECBaseline.ts $FLAGS &
          NODE_PID=$!
          echo "Node.js script started with PID: $NODE_PID"

          # Start the watchdog in the background
          (
            sleep ${SCRIPT_BUDGET_SECONDS}
            if kill -0 $NODE_PID 2>/dev/null; then
              echo "[watchdog] Budget reached — sending SIGTERM to PID $NODE_PID"
              kill -TERM $NODE_PID 2>/dev/null || true
              sleep 60
              if kill -0 $NODE_PID 2>/dev/null; then
                echo "[watchdog] Still alive after 60s — sending SIGKILL to PID $NODE_PID"
                kill -KILL $NODE_PID 2>/dev/null || true
              fi
            fi
          ) &
          WATCHDOG_PID=$!

          # Wait for the Node.js script to finish
          wait $NODE_PID
          SCRIPT_EXIT=$?

          # Kill the watchdog (it may still be sleeping)
          kill $WATCHDOG_PID 2>/dev/null || true
          wait $WATCHDOG_PID 2>/dev/null || true

          set -e

          echo ""
          echo "Script exit code: $SCRIPT_EXIT"

          if [ $SCRIPT_EXIT -eq 0 ]; then
            echo "Script completed successfully within time budget"
            echo "script_status=completed" >> $GITHUB_OUTPUT
          elif [ $SCRIPT_EXIT -eq 143 ] || [ $SCRIPT_EXIT -eq 130 ]; then
            # 143 = SIGTERM (128+15), 130 = SIGINT (128+2)
            echo "Script was gracefully terminated by watchdog (exit $SCRIPT_EXIT)"
            echo "Partial results flushed by the script's internal SIGTERM handler"
            echo "script_status=partial" >> $GITHUB_OUTPUT
            exit 0
          elif [ $SCRIPT_EXIT -eq 137 ]; then
            # 137 = SIGKILL (128+9) — script did not exit within 60s grace period
            echo "WARNING: Script required SIGKILL (did not exit within 60s grace period)"
            echo "Checkpoint file may still contain partial results from completed companies"
            echo "script_status=partial" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Script exited with unexpected code $SCRIPT_EXIT"
            echo "script_status=failed" >> $GITHUB_OUTPUT
            exit $SCRIPT_EXIT
          fi

      # -- Step 7: Check if results were written (runs even on timeout) ------
      - name: Check for changes
        id: check_changes
        # Always run - captures partial results if script was cut short
        if: always()
        run: |
          mkdir -p docs/baseline-results

          SCRIPT_STATUS="${{ steps.baseline.outputs.script_status }}"
          if [ "$SCRIPT_STATUS" = "partial" ]; then
            echo "NOTE: Script was stopped by time-budget watchdog - checking for partial results"
          fi

          if git diff --quiet -- docs/baseline-results/ 2>/dev/null; then
            UNTRACKED=$(git ls-files --others --exclude-standard docs/baseline-results/ | wc -l)
            if [ "$UNTRACKED" -gt "0" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "New baseline-results files detected ($UNTRACKED untracked files)"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No changes detected in docs/baseline-results/"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in docs/baseline-results/"
            git diff --stat -- docs/baseline-results/ || true
          fi

          # Report what files are present
          echo ""
          echo "Files in docs/baseline-results/:"
          ls -lah docs/baseline-results/ || echo "(directory empty or missing)"

      # -- Step 8: Copy results to public folder (for Vite static serving) ---
      - name: Copy results to public folder
        # Always run so partial results are also served statically
        if: always() && steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p public/docs/baseline-results
          if [ -f docs/baseline-results/latest.json ]; then
            cp docs/baseline-results/latest.json public/docs/baseline-results/latest.json
            echo "Copied latest.json to public/docs/baseline-results/"
          else
            echo "docs/baseline-results/latest.json not found - skipping copy"
          fi
          if [ -f docs/baseline-results/latest-summary.md ]; then
            cp docs/baseline-results/latest-summary.md public/docs/baseline-results/latest-summary.md
            echo "Copied latest-summary.md to public/docs/baseline-results/"
          fi

      # -- Step 9: Commit and push results (always - captures partial results)
      - name: Commit and push results
        # Always run so partial results from a timed-out run are committed
        if: always() && steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add docs/baseline-results/ || true
          git add public/docs/baseline-results/ || true

          if git diff --cached --quiet; then
            echo "Nothing to commit after staging"
            exit 0
          fi

          CHANGED_STAT=$(git diff --cached --stat docs/baseline-results/ | tail -1)
          CATEGORY="${{ github.event.inputs.category }}"
          TICKER="${{ github.event.inputs.ticker }}"
          TICKER_NOTE=""
          if [ -n "$TICKER" ]; then
            TICKER_NOTE=" (ticker: $TICKER)"
          fi

          SCRIPT_STATUS="${{ steps.baseline.outputs.script_status }}"
          STATUS_NOTE=""
          if [ "$SCRIPT_STATUS" = "partial" ]; then
            STATUS_NOTE=" [PARTIAL - time budget reached, resume with --resume flag]"
          fi

          git commit -m "chore(data): sec-baseline results - category $CATEGORY$TICKER_NOTE$STATUS_NOTE [skip ci]

          Automated SEC runtime baseline via GitHub Actions
          Date: $(date -u '+%Y-%m-%d %H:%M UTC')
          Category: $CATEGORY$TICKER_NOTE
          Status: ${SCRIPT_STATUS:-completed}
          ${CHANGED_STAT}

          Outputs:
          - docs/baseline-results/latest.json               (always overwritten)
          - docs/baseline-results/latest-summary.md         (human-readable report)
          - docs/baseline-results/baseline-*.json           (timestamped archive)
          - docs/baseline-results/checkpoint.json           (resume support - use --resume to continue)
          - public/docs/baseline-results/latest.json        (Vite static serving copy)

          To resume a partial run locally:
            npx tsx src/scripts/runSECBaseline.ts --resume --phase=<phase>"

          git push origin HEAD
          echo "Results committed and pushed successfully (status: ${SCRIPT_STATUS:-completed})"

      # -- Step 10: Upload artifacts (always - captures partial results) ------
      - name: Upload baseline artifacts
        if: always() && github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sec-baseline-results-${{ github.run_id }}
          path: |
            docs/baseline-results/latest.json
            docs/baseline-results/latest-summary.md
            docs/baseline-results/checkpoint.json
            docs/baseline-results/baseline-*.json
          if-no-files-found: warn
          retention-days: 30

      # -- Step 11: Job summary -----------------------------------------------
      - name: Job summary
        if: always()
        run: |
          SCRIPT_STATUS="${{ steps.baseline.outputs.script_status }}"
          CHANGES="${{ steps.check_changes.outputs.changed }}"

          echo "## SEC Runtime Baseline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SCRIPT_STATUS" = "partial" ]; then
            echo "> **PARTIAL RUN** - Time budget (2.5 hours) was reached. Partial results have been saved and committed." >> $GITHUB_STEP_SUMMARY
            echo "> To continue from where it left off, run locally with: \`npx tsx src/scripts/runSECBaseline.ts --resume\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Category | ${{ github.event.inputs.category }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ticker override | ${{ github.event.inputs.ticker || '(none - full category)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script status | ${SCRIPT_STATUS:-unknown} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes committed | ${CHANGES:-false} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hard timeout | 150 min (2.5 hours) |" >> $GITHUB_STEP_SUMMARY
          echo "| Graceful shutdown buffer | 8 min before hard limit |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output files" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/latest.json\` - full or partial results" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/latest-summary.md\` - human-readable report" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/baseline-[ISO].json\` - timestamped archive" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/checkpoint.json\` - resume checkpoint (use --resume to continue)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- If status is \`partial\`: results up to the cutoff point are fully usable" >> $GITHUB_STEP_SUMMARY
          echo "- Resume a partial run: \`npx tsx src/scripts/runSECBaseline.ts --resume\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`OPENAI_API_KEY\` is required for narrative parsing" >> $GITHUB_STEP_SUMMARY
          echo "- Commits use \`[skip ci]\` to prevent workflow loops" >> $GITHUB_STEP_SUMMARY

  # -- Failure notification job ----------------------------------------------
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: run-sec-baseline
    if: failure()

    steps:
      - name: Create failure issue annotation
        run: |
          echo "::error title=SEC Baseline Run Failed::The SEC runtime baseline workflow failed. Check the workflow logs for details."
          echo "## SEC Runtime Baseline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The SEC baseline run failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
          echo "- Missing secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY not set" >> $GITHUB_STEP_SUMMARY
          echo "- EDGAR rate limiting (HTTP 429) - reduce concurrency and retry" >> $GITHUB_STEP_SUMMARY
          echo "- OPENAI_API_KEY secret missing or expired" >> $GITHUB_STEP_SUMMARY
          echo "- Network timeout fetching a large 10-K HTML document" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript compilation error in runSECBaseline.ts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quick fix - test without secrets:**" >> $GITHUB_STEP_SUMMARY
          echo "Re-run the workflow with dry_run=true to validate the setup without making any API calls." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# CO-GRI Platform — SEC Runtime Baseline
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs the SEC baseline script against live EDGAR filings and commits the
# results back to docs/baseline-results/ in the repository.
#
# What it does:
#   1. Resolves CIK numbers for each SEC-eligible company
#   2. Fetches the latest 10-K or 20-F filing from EDGAR
#   3. Parses structured data (revenue/PP&E/debt tables via cheerio DOM)
#   4. Extracts geographic narrative segments via OpenAI
#   5. Assigns evidence tiers and composite confidence scores
#   6. Writes results to docs/baseline-results/ and commits them
#
# Required GitHub Secrets:
#   SUPABASE_URL      — Supabase project URL
#   SUPABASE_ANON_KEY — Supabase anon key
#   OPENAI_API_KEY    — Required for narrative parsing (extract_geographic_narrative
#                       edge function calls the OpenAI Chat Completions API to
#                       identify geographic revenue segments in 10-K/20-F prose).
#                       Without this key the narrative parsing step is skipped and
#                       narrativeParsingSucceeded will be false for all companies.
#
# Manual trigger only (no schedule — runs can take 15–60 min depending on category):
#   GitHub UI → Actions → "SEC Runtime Baseline" → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: SEC Runtime Baseline

on:
  # Manual trigger only — this job can be long-running and expensive
  workflow_dispatch:
    inputs:
      category:
        description: 'Company category to process'
        required: true
        default: 'A'
        type: choice
        options:
          - 'A'        # Cat A only — 41 hardcoded pilot companies
          - 'A+B'      # Cat A + B — ~55 companies (adds EDGAR-searched)
          - 'A+B+C'    # All SEC-eligible companies
          - 'full'     # Alias for A+B+C
      ticker:
        description: 'Single ticker override (e.g. AAPL) — leave blank for full category run'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (list tickers only, no API calls, no file writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-sec-baseline:
    name: Run SEC Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Full A+B+C run can take ~60 min at concurrency=3

    # Opt into Node.js 24 for all actions in this job to avoid the Node.js 20
    # deprecation warning. Node.js 24 becomes the default on June 2nd, 2026 and
    # Node.js 20 is removed entirely on September 16th, 2026.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write  # Required to commit and push docs/baseline-results/

    steps:
      # ── Step 1: Checkout repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write permissions for the commit step
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Setup Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Step 3: Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          # Use --legacy-peer-deps as a safety net for peer dependency drift
          # (e.g. @eslint/js version mismatches with eslint)
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
        env:
          NODE_ENV: development

      # ── Step 4: Validate required secrets ─────────────────────────────────
      - name: Validate required secrets
        run: |
          MISSING=""

          if [ -z "$SUPABASE_URL" ]; then
            echo "⚠️  WARNING: SUPABASE_URL secret is not set — Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_URL"
          else
            echo "✅ SUPABASE_URL is available"
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "⚠️  WARNING: SUPABASE_ANON_KEY secret is not set — Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_ANON_KEY"
          else
            echo "✅ SUPABASE_ANON_KEY is available"
          fi

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️  WARNING: OPENAI_API_KEY secret is not set."
            echo "   Narrative parsing (extract_geographic_narrative) will be skipped."
            echo "   narrativeParsingSucceeded will be false for all companies."
            echo "   To enable: Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name: OPENAI_API_KEY  Value: sk-..."
            MISSING="$MISSING OPENAI_API_KEY"
          else
            echo "✅ OPENAI_API_KEY is available"
          fi

          if [ -n "$MISSING" ]; then
            echo ""
            echo "ℹ️  Missing secrets:$MISSING"
            echo "   The run will continue in degraded mode (no Supabase writes / no narrative parsing)."
          fi

          # If SUPABASE_URL and SUPABASE_ANON_KEY are both missing AND this is not a dry run,
          # we must abort — the script will exit(1) itself, but let's be explicit here.
          DRY_RUN_INPUT="${{ github.event.inputs.dry_run }}"
                    if [ "$DRY_RUN_INPUT" != "true" ] && [ -z "$SUPABASE_URL" ] && [ -z "$SUPABASE_ANON_KEY" ]; then
            echo ""
            echo "⚠️  WARNING: SUPABASE_URL and/or SUPABASE_ANON_KEY are missing."
            echo "   Continuing in degraded mode — the script will write a results"
            echo "   file explaining the missing secrets so the dashboard can show"
            echo "   a meaningful error instead of a blank placeholder."
            echo ""
          fi

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ── Step 5: Ensure output directories exist ────────────────────────────
      - name: Ensure output directories exist
        run: |
          mkdir -p docs/baseline-results
          mkdir -p public/docs/baseline-results
          # Create .gitkeep so the directory is tracked even if empty
          if [ ! -f docs/baseline-results/.gitkeep ]; then
            touch docs/baseline-results/.gitkeep
          fi
          echo "✅ Output directories ready"
          ls -la docs/baseline-results/

      # ── Step 6: Run the SEC baseline script ────────────────────────────────
      - name: Run SEC baseline
        id: baseline
        run: |
          # ── Build CLI flags ──────────────────────────────────────────────
          FLAGS=""

          # Map category input to --phase= flag
          CATEGORY="${{ github.event.inputs.category }}"
          case "$CATEGORY" in
            "A")
              FLAGS="$FLAGS --phase=1"
              echo "📋 Category A — 41 pilot companies (phase=1)"
              ;;
            "A+B")
              FLAGS="$FLAGS --phase=2"
              echo "📋 Category A+B — ~55 companies (phase=2)"
              ;;
            "A+B+C"|"full")
              FLAGS="$FLAGS --phase=3"
              echo "📋 Category A+B+C / full — all SEC-eligible companies (phase=3)"
              ;;
            *)
              FLAGS="$FLAGS --phase=1"
              echo "📋 Unknown category '$CATEGORY', defaulting to phase=1 (Cat A)"
              ;;
          esac

          # Single ticker override
          TICKER="${{ github.event.inputs.ticker }}"
          if [ -n "$TICKER" ]; then
            FLAGS="$FLAGS --ticker=$TICKER"
            echo "🎯 Single ticker mode: $TICKER"
          fi

          # Dry run
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "🔍 Running in DRY RUN mode — no API calls, no file writes"
          fi

          echo ""
          echo "▶ npx tsx src/scripts/runSECBaseline.ts $FLAGS"
          echo ""

          npx tsx src/scripts/runSECBaseline.ts $FLAGS
        env:
          # Pass both SUPABASE_URL and VITE_SUPABASE_URL so the script finds them
          # regardless of which env var name it checks first
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NODE_ENV: production

      # ── Step 7: Check if results were written ─────────────────────────────
      - name: Check for changes
        id: check_changes
        if: always()
        run: |
          # Ensure the directory exists before running git diff
          mkdir -p docs/baseline-results

          # Check for modified tracked files
          if git diff --quiet -- docs/baseline-results/ 2>/dev/null; then
            # Also check for new untracked files (first-ever run or new timestamped files)
            UNTRACKED=$(git ls-files --others --exclude-standard docs/baseline-results/ | wc -l)
            if [ "$UNTRACKED" -gt "0" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "📝 New baseline-results files detected ($UNTRACKED untracked files)"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "✅ No changes detected in docs/baseline-results/"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes detected in docs/baseline-results/"
            git diff --stat -- docs/baseline-results/ || true
          fi

      # ── Step 8: Copy results to public folder (for Vite static serving) ───
      - name: Copy results to public folder
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p public/docs/baseline-results
          if [ -f docs/baseline-results/latest.json ]; then
            cp docs/baseline-results/latest.json public/docs/baseline-results/latest.json
            echo "✅ Copied latest.json to public/docs/baseline-results/"
          else
            echo "⚠️  docs/baseline-results/latest.json not found — skipping copy"
          fi
          if [ -f docs/baseline-results/latest-summary.md ]; then
            cp docs/baseline-results/latest-summary.md public/docs/baseline-results/latest-summary.md
            echo "✅ Copied latest-summary.md to public/docs/baseline-results/"
          fi

      # ── Step 9: Commit and push results ────────────────────────────────────
      - name: Commit and push results
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage docs/baseline-results/ AND public/docs/baseline-results/
          git add docs/baseline-results/ || true
          git add public/docs/baseline-results/ || true

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "ℹ️  Nothing to commit after staging"
            exit 0
          fi

          # Summarise what changed
          CHANGED_STAT=$(git diff --cached --stat docs/baseline-results/ | tail -1)

          # Build a descriptive commit message
          CATEGORY="${{ github.event.inputs.category }}"
          TICKER="${{ github.event.inputs.ticker }}"
          TICKER_NOTE=""
          if [ -n "$TICKER" ]; then
            TICKER_NOTE=" (ticker: $TICKER)"
          fi

          # Commit with [skip ci] to prevent triggering other workflows
          git commit -m "chore(data): sec-baseline results — category $CATEGORY$TICKER_NOTE [skip ci]

          Automated SEC runtime baseline via GitHub Actions
          Date: $(date -u '+%Y-%m-%d %H:%M UTC')
          Category: $CATEGORY$TICKER_NOTE
          ${CHANGED_STAT}

          Outputs:
          - docs/baseline-results/latest.json               (always overwritten)
          - docs/baseline-results/latest-summary.md         (human-readable report)
          - docs/baseline-results/baseline-*.json           (timestamped archive)
          - docs/baseline-results/checkpoint.json           (resume support)
          - public/docs/baseline-results/latest.json        (Vite static serving copy)"

          git push origin HEAD
          echo "✅ Baseline results committed and pushed to both docs/ and public/ successfully"

      # ── Step 10: Upload artifacts (correct output paths) ──────────────────
      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sec-baseline-results-${{ github.run_id }}
          # Use the actual output paths that the script writes to
          path: |
            docs/baseline-results/latest.json
            docs/baseline-results/latest-summary.md
            docs/baseline-results/checkpoint.json
          if-no-files-found: warn
          retention-days: 30

      # ── Step 11: Job summary ───────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## SEC Runtime Baseline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Category | ${{ github.event.inputs.category }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ticker override | ${{ github.event.inputs.ticker || '(none — full category)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes committed | ${{ steps.check_changes.outputs.changed || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output files" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/latest.json\` — full results (always overwritten)" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/latest-summary.md\` — human-readable report" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/baseline-[ISO].json\` — timestamped archive" >> $GITHUB_STEP_SUMMARY
          echo "- \`docs/baseline-results/checkpoint.json\` — resume checkpoint" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- \`OPENAI_API_KEY\` is required for narrative parsing; without it \`narrativeParsingSucceeded\` will be \`false\` for all companies" >> $GITHUB_STEP_SUMMARY
          echo "- Commits use \`[skip ci]\` to prevent workflow loops" >> $GITHUB_STEP_SUMMARY
          echo "- Use \`--resume\` flag locally to continue an interrupted run from \`checkpoint.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- If secrets are missing, re-run with \`dry_run=true\` to validate the workflow without API calls" >> $GITHUB_STEP_SUMMARY

  # ── Failure notification job ──────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: run-sec-baseline
    if: failure()

    steps:
      - name: Create failure issue annotation
        run: |
          echo "::error title=SEC Baseline Run Failed::The SEC runtime baseline workflow failed. Check the workflow logs for details."
          echo "## ❌ SEC Runtime Baseline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The SEC baseline run failed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
          echo "- Missing secrets: \`SUPABASE_URL\` and/or \`SUPABASE_ANON_KEY\` not set → script exits with code 1" >> $GITHUB_STEP_SUMMARY
          echo "- EDGAR rate limiting (HTTP 429) — reduce \`--concurrency\` and retry" >> $GITHUB_STEP_SUMMARY
          echo "- \`OPENAI_API_KEY\` secret missing or expired — narrative parsing will fail" >> $GITHUB_STEP_SUMMARY
          echo "- Network timeout fetching a large 10-K HTML document" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript compilation error in \`runSECBaseline.ts\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quick fix — test without secrets:**" >> $GITHUB_STEP_SUMMARY
          echo "Re-run the workflow with \`dry_run=true\` to validate the setup without making any API calls." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY

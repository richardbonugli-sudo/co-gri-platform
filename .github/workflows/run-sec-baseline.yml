# ─────────────────────────────────────────────────────────────────────────────
# CO-GRI Platform — SEC Runtime Baseline
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs the SEC baseline script against live EDGAR filings and commits the
# results back to docs/baseline-results/ in the repository.
#
# What it does:
#   1. Resolves CIK numbers for each SEC-eligible company
#   2. Fetches the latest 10-K or 20-F filing from EDGAR
#   3. Parses structured data (revenue/PP&E/debt tables via cheerio DOM)
#   4. Extracts geographic narrative segments via OpenAI
#   5. Assigns evidence tiers and composite confidence scores
#   6. Writes results to docs/baseline-results/ and commits them
#
# Required GitHub Secrets:
#   SUPABASE_URL      — Supabase project URL
#   SUPABASE_ANON_KEY — Supabase anon key
#   OPENAI_API_KEY    — Required for narrative parsing (extract_geographic_narrative
#                       edge function calls the OpenAI Chat Completions API to
#                       identify geographic revenue segments in 10-K/20-F prose).
#                       Without this key the narrative parsing step is skipped and
#                       narrativeParsingSucceeded will be false for all companies.
#
# Manual trigger only (no schedule — runs can take 15–60 min depending on category):
#   GitHub UI → Actions → "SEC Runtime Baseline" → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: SEC Runtime Baseline

on:
  # Manual trigger only — this job can be long-running and expensive
  workflow_dispatch:
    inputs:
      category:
        description: 'Company category to process'
        required: true
        default: 'A'
        type: choice
        options:
          - 'A'        # Cat A only — 41 hardcoded pilot companies
          - 'A+B'      # Cat A + B — ~55 companies (adds EDGAR-searched)
          - 'A+B+C'    # All SEC-eligible companies
          - 'full'     # Alias for A+B+C
      ticker:
        description: 'Single ticker override (e.g. AAPL) — leave blank for full category run'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (list tickers only, no API calls, no file writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      verbose:
        description: 'Enable verbose logging (--verbose flag passed to the script)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-sec-baseline:
    name: Run SEC Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 90   # Full A+B+C run can take ~60 min at concurrency=3

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write  # Required to commit and push docs/baseline-results/

    steps:
      # ── Step 1: Checkout repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── Step 2: Setup Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      # ── Step 3: Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          NODE_ENV: development

      # ── Step 4: Validate required secrets ─────────────────────────────────
      - name: Validate required secrets
        run: |
          MISSING=""

          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "⚠️  WARNING: SUPABASE_URL secret is not set — Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_URL"
          else
            echo "✅ SUPABASE_URL is available"
          fi

          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "⚠️  WARNING: SUPABASE_ANON_KEY secret is not set — Supabase writes will be skipped"
            MISSING="$MISSING SUPABASE_ANON_KEY"
          else
            echo "✅ SUPABASE_ANON_KEY is available"
          fi

          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "⚠️  WARNING: OPENAI_API_KEY secret is not set."
            echo "   Narrative parsing (extract_geographic_narrative) will be skipped."
            echo "   narrativeParsingSucceeded will be false for all companies."
            MISSING="$MISSING OPENAI_API_KEY"
          else
            echo "✅ OPENAI_API_KEY is available"
          fi

          if [ -n "$MISSING" ]; then
            echo ""
            echo "ℹ️  Missing secrets:$MISSING"
            echo "   The run will continue in degraded mode."
          fi

      # ── Step 5: Run the SEC baseline script ────────────────────────────────
      - name: Run SEC baseline
        id: baseline
        run: |
          FLAGS=""

          CATEGORY="${{ github.event.inputs.category }}"
          case "$CATEGORY" in
            "A")
              FLAGS="$FLAGS --phase=1"
              echo "📋 Category A — 41 pilot companies (phase=1)"
              ;;
            "A+B")
              FLAGS="$FLAGS --phase=2"
              echo "📋 Category A+B — ~55 companies (phase=2)"
              ;;
            "A+B+C"|"full")
              FLAGS="$FLAGS --phase=3"
              echo "📋 Category A+B+C / full — all SEC-eligible companies (phase=3)"
              ;;
            *)
              FLAGS="$FLAGS --phase=1"
              echo "📋 Unknown category '$CATEGORY', defaulting to phase=1 (Cat A)"
              ;;
          esac

          TICKER="${{ github.event.inputs.ticker }}"
          if [ -n "$TICKER" ]; then
            FLAGS="<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>F</mi><mi>L</mi><mi>A</mi><mi>G</mi><mi>S</mi><mo>−</mo><mo>−</mo><mi>t</mi><mi>i</mi><mi>c</mi><mi>k</mi><mi>e</mi><mi>r</mi><mo>=</mo></mrow><annotation encoding="application/x-tex">FLAGS --ticker=</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7667em;vertical-align:-0.0833em;"></span><span class="mord mathnormal" style="margin-right:0.13889em;">F</span><span class="mord mathnormal">L</span><span class="mord mathnormal">A</span><span class="mord mathnormal" style="margin-right:0.05764em;">GS</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.7778em;vertical-align:-0.0833em;"></span><span class="mord">−</span><span class="mord mathnormal">t</span><span class="mord mathnormal">i</span><span class="mord mathnormal">c</span><span class="mord mathnormal" style="margin-right:0.03148em;">k</span><span class="mord mathnormal" style="margin-right:0.02778em;">er</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span></span></span></span>TICKER"
            echo "🎯 Single ticker mode: $TICKER"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
            echo "🔍 Running in DRY RUN mode — no API calls, no file writes"
          fi

          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            FLAGS="$FLAGS --verbose"
            echo "🔊 Verbose logging enabled"
          fi

          echo ""
          echo "▶ npx tsx src/scripts/runSECBaseline.ts $FLAGS"
          echo ""

          npx tsx src/scripts/runSECBaseline.ts $FLAGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NODE_ENV: production

      # ── Step 6: Check if results were written ─────────────────────────────
      - name: Check for changes
        id: check_changes
        run: |
          # Legacy path fallback
          if [ -f docs/sec_baseline_results.json ] && [ ! -f docs/baseline-results/latest.json ]; then
            mkdir -p docs/baseline-results
            cp docs/sec_baseline_results.json docs/baseline-results/latest.json
            echo "Legacy output path detected - copied to docs/baseline-results/latest.json"
          fi

          CHANGED=false

          if ! git diff --quiet docs/baseline-results/ 2>/dev/null; then
            CHANGED=true
            echo "Modified tracked files detected in docs/baseline-results/"
            git diff --stat docs/baseline-results/
          fi

          UNTRACKED=$(git ls-files --others --exclude-standard docs/baseline-results/ 2>/dev/null | wc -l | tr -d ' ')
          if [ "$UNTRACKED" -gt "0" ]; then
            CHANGED=true
            echo "New untracked baseline-results files detected ($UNTRACKED files)"
          fi

          echo "changed=<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>C</mi><mi>H</mi><mi>A</mi><mi>N</mi><mi>G</mi><mi>E</mi><mi>D</mi><mi mathvariant="normal">&quot;</mi><mo>&gt;</mo><mo>&gt;</mo></mrow><annotation encoding="application/x-tex">CHANGED&quot; &gt;&gt; </annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.7335em;vertical-align:-0.0391em;"></span><span class="mord mathnormal" style="margin-right:0.07153em;">C</span><span class="mord mathnormal" style="margin-right:0.08125em;">H</span><span class="mord mathnormal">A</span><span class="mord mathnormal" style="margin-right:0.05764em;">NGE</span><span class="mord mathnormal" style="margin-right:0.02778em;">D</span><span class="mord">&quot;</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">&gt;&gt;</span></span></span></span>GITHUB_OUTPUT
          echo "Final change detection result: changed=<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>C</mi><mi>H</mi><mi>A</mi><mi>N</mi><mi>G</mi><mi>E</mi><mi>D</mi><mo stretchy="false">(</mo><mi>u</mi><mi>n</mi><mi>t</mi><mi>r</mi><mi>a</mi><mi>c</mi><mi>k</mi><mi>e</mi><mi>d</mi><mo>=</mo></mrow><annotation encoding="application/x-tex">CHANGED (untracked=</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord mathnormal" style="margin-right:0.07153em;">C</span><span class="mord mathnormal" style="margin-right:0.08125em;">H</span><span class="mord mathnormal">A</span><span class="mord mathnormal" style="margin-right:0.05764em;">NGE</span><span class="mord mathnormal" style="margin-right:0.02778em;">D</span><span class="mopen">(</span><span class="mord mathnormal">u</span><span class="mord mathnormal">n</span><span class="mord mathnormal">t</span><span class="mord mathnormal" style="margin-right:0.02778em;">r</span><span class="mord mathnormal">a</span><span class="mord mathnormal">c</span><span class="mord mathnormal" style="margin-right:0.03148em;">k</span><span class="mord mathnormal">e</span><span class="mord mathnormal">d</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span></span></span></span>UNTRACKED)"

      # ── Step 6b: Copy results to public folder ─────────────────────────────
      - name: Copy results to public folder
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p public/docs/baseline-results
          mkdir -p docs/baseline-results

          if [ ! -f docs/baseline-results/latest.json ]; then
            echo "::error title=Missing Output File::docs/baseline-results/latest.json was not found after the script completed."
            echo ""
            echo "FATAL: docs/baseline-results/latest.json is missing."
            echo "Possible causes:"
            echo "  1. The script wrote to a different path (check runSECBaseline.ts OUTPUT_DIR)"
            echo "  2. The script exited early due to an error (check Step 5 logs)"
            echo "  3. The script ran in --dry-run mode (no file writes in dry-run)"
            echo "  4. A legacy output path was used (docs/sec_baseline_results.json)"
            echo ""
            exit 1
          fi

          cp docs/baseline-results/latest.json public/docs/baseline-results/latest.json
          echo "✅ Copied latest.json to public/docs/baseline-results/"

          RUN_ID=$(node -e "try{const d=require('./public/docs/baseline-results/latest.json');console.log(d.runId||'unknown')}catch(e){console.log('error')}")
          echo "Run ID in public copy: $RUN_ID"
          RESULT_COUNT=$(node -e "try{const d=require('./public/docs/baseline-results/latest.json');console.log((d.results||[]).length)}catch(e){console.log(0)}")
          echo "Results count: $RESULT_COUNT companies"

          if [ "$RUN_ID" = "pending-first-run" ]; then
            echo "::warning title=Placeholder Sentinel Detected::The copied latest.json still contains runId=pending-first-run."
          fi

          if [ -f docs/baseline-results/latest-summary.md ]; then
            cp docs/baseline-results/latest-summary.md public/docs/baseline-results/latest-summary.md
            echo "✅ Copied latest-summary.md to public/docs/baseline-results/"
          fi

      # ── Step 7: Commit and push results ────────────────────────────────────
      - name: Commit and push results
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add docs/baseline-results/ public/docs/baseline-results/

          CHANGED_STAT=$(git diff --cached --stat docs/baseline-results/ | tail -1)

          CATEGORY="${{ github.event.inputs.category }}"
          TICKER="${{ github.event.inputs.ticker }}"
          TICKER_NOTE=""
          if [ -n "$TICKER" ]; then
            TICKER_NOTE=" (ticker: $TICKER)"
          fi

          git commit -m "chore(data): sec-baseline results — category <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>C</mi><mi>A</mi><mi>T</mi><mi>E</mi><mi>G</mi><mi>O</mi><mi>R</mi><mi>Y</mi></mrow><annotation encoding="application/x-tex">CATEGORY</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07153em;">C</span><span class="mord mathnormal">A</span><span class="mord mathnormal" style="margin-right:0.00773em;">TEGOR</span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span>TICKER_NOTE [skip ci]

          Automated SEC runtime baseline via GitHub Actions
          Date: $(date -u '+%Y-%m-%d %H:%M UTC')
          Category: <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>C</mi><mi>A</mi><mi>T</mi><mi>E</mi><mi>G</mi><mi>O</mi><mi>R</mi><mi>Y</mi></mrow><annotation encoding="application/x-tex">CATEGORY</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord mathnormal" style="margin-right:0.07153em;">C</span><span class="mord mathnormal">A</span><span class="mord mathnormal" style="margin-right:0.00773em;">TEGOR</span><span class="mord mathnormal" style="margin-right:0.22222em;">Y</span></span></span></span>TICKER_NOTE
          ${CHANGED_STAT}

          Outputs:
          - docs/baseline-results/latest.json               (always overwritten)
          - docs/baseline-results/latest-summary.md         (human-readable report)
          - docs/baseline-results/baseline-*.json           (timestamped archive)
          - docs/baseline-results/checkpoint.json           (resume support)
          - public/docs/baseline-results/latest.json        (Vite static serving copy)"

          git push origin HEAD
          echo "✅ Baseline results committed and pushed successfully"

      # ── Step 8: Job summary ────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## SEC Runtime Baseline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mo stretchy="false">(</mo><mi>d</mi><mi>a</mi><mi>t</mi><mi>e</mi><mo>−</mo><msup><mi>u</mi><mo mathvariant="normal" lspace="0em" rspace="0em">′</mo></msup><mo>+</mo></mrow><annotation encoding="application/x-tex">(date -u &#x27;+%Y-%m-%d %H:%M UTC&#x27;) |&quot; &gt;&gt; </annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mopen">(</span><span class="mord mathnormal">d</span><span class="mord mathnormal">a</span><span class="mord mathnormal">t</span><span class="mord mathnormal">e</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">−</span><span class="mspace" style="margin-right:0.2222em;"></span></span><span class="base"><span class="strut" style="height:0.8352em;vertical-align:-0.0833em;"></span><span class="mord"><span class="mord mathnormal">u</span><span class="msupsub"><span class="vlist-t"><span class="vlist-r"><span class="vlist" style="height:0.7519em;"><span style="top:-3.063em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">′</span></span></span></span></span></span></span></span></span><span class="mord">+</span></span></span></span>GITHUB_STEP_SUMMARY
          echo "| Trigger | <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mrow><mi>g</mi><mi>i</mi><mi>t</mi><mi>h</mi><mi>u</mi><mi>b</mi><mi mathvariant="normal">.</mi><mi>e</mi><mi>v</mi><mi>e</mi><mi>n</mi><msub><mi>t</mi><mi>n</mi></msub><mi>a</mi><mi>m</mi><mi>e</mi></mrow><mi mathvariant="normal">∣</mi><mi mathvariant="normal">&quot;</mi><mo>&gt;</mo><mo>&gt;</mo></mrow><annotation encoding="application/x-tex">{{ github.event_name }} |&quot; &gt;&gt; </annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">g</span><span class="mord mathnormal">i</span><span class="mord mathnormal">t</span><span class="mord mathnormal">h</span><span class="mord mathnormal">u</span><span class="mord mathnormal">b</span><span class="mord">.</span><span class="mord mathnormal">e</span><span class="mord mathnormal" style="margin-right:0.03588em;">v</span><span class="mord mathnormal">e</span><span class="mord mathnormal">n</span><span class="mord"><span class="mord mathnormal">t</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:0em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mathnormal mtight">n</span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span><span class="mord mathnormal">am</span><span class="mord mathnormal">e</span></span></span><span class="mord">∣&quot;</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">&gt;&gt;</span></span></span></span>GITHUB_STEP_SUMMARY
          echo "| Category | <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mrow><mi>g</mi><mi>i</mi><mi>t</mi><mi>h</mi><mi>u</mi><mi>b</mi><mi mathvariant="normal">.</mi><mi>e</mi><mi>v</mi><mi>e</mi><mi>n</mi><mi>t</mi><mi mathvariant="normal">.</mi><mi>i</mi><mi>n</mi><mi>p</mi><mi>u</mi><mi>t</mi><mi>s</mi><mi mathvariant="normal">.</mi><mi>c</mi><mi>a</mi><mi>t</mi><mi>e</mi><mi>g</mi><mi>o</mi><mi>r</mi><mi>y</mi></mrow><mi mathvariant="normal">∣</mi><mi mathvariant="normal">&quot;</mi><mo>&gt;</mo><mo>&gt;</mo></mrow><annotation encoding="application/x-tex">{{ github.event.inputs.category }} |&quot; &gt;&gt; </annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:1em;vertical-align:-0.25em;"></span><span class="mord"><span class="mord"><span class="mord mathnormal" style="margin-right:0.03588em;">g</span><span class="mord mathnormal">i</span><span class="mord mathnormal">t</span><span class="mord mathnormal">h</span><span class="mord mathnormal">u</span><span class="mord mathnormal">b</span><span class="mord">.</span><span class="mord mathnormal">e</span><span class="mord mathnormal" style="margin-right:0.03588em;">v</span><span class="mord mathnormal">e</span><span class="mord mathnormal">n</span><span class="mord mathnormal">t</span><span class="mord">.</span><span class="mord mathnormal">in</span><span class="mord mathnormal">p</span><span class="mord mathnormal">u</span><span class="mord mathnormal">t</span><span class="mord mathnormal">s</span><span class="mord">.</span><span class="mord mathnormal">c</span><span class="mord mathnormal">a</span><span class="mord mathnormal">t</span><span class="mord mathnormal">e</span><span class="mord mathnormal" style="margin-right:0.03588em;">g</span><span class="mord mathnormal" style="margin-right:0.03588em;">ory</span></span></span><span class="mord">∣&quot;</span><spa
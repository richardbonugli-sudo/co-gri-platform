name: Run SEC Runtime Baseline

on:
  workflow_dispatch:
    inputs:
      phase:
        description: 'Baseline phase (1=CatA pilot, 2=CatA+B, 3=full)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - full
      ticker:
        description: 'Single ticker e.g. AAPL (overrides phase if set)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run - list tickers only, no API calls'
        required: false
        default: false
        type: boolean
      concurrency:
        description: 'Concurrent workers 1-10, default 3'
        required: false
        default: '3'
        type: string
      resume:
        description: 'Resume from checkpoint'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

jobs:
  run-baseline:
    name: SEC Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: shadcn-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: shadcn-ui

      - name: Validate baseline script
        working-directory: shadcn-ui
        run: test -f src/scripts/runSECBaseline.ts && echo "OK" || exit 1

      - name: TypeScript check
        working-directory: shadcn-ui
        continue-on-error: true
        run: npx tsc --noEmit --skipLibCheck src/scripts/runSECBaseline.ts 2>&1 || true

      - name: Run SEC baseline
        working-directory: shadcn-ui
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npx tsx src/scripts/runSECBaseline.ts --phase=${{ github.event.inputs.phase }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sec-baseline-${{ github.run_id }}
          path: |
            shadcn-ui/docs/sec_baseline_results.json
            shadcn-ui/docs/sec_baseline_summary.md
            shadcn-ui/docs/sec_baseline_checkpoint.jsonl
          retention-days: 90
          if-no-files-found: warn

      - name: Commit results
        if: success()
        working-directory: shadcn-ui
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sec_baseline_results.json docs/sec_baseline_summary.md docs/sec_baseline_checkpoint.jsonl 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: SEC baseline run [skip ci]" && git push
